<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画日文OCR Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            transition: all 0.3s ease;
        }
        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        .upload-section.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .preview-section {
            display: none;
            margin-top: 30px;
        }
        .preview-section.active {
            display: block;
        }
        .image-container {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .image-box {
            flex: 1;
            min-width: 300px;
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .image-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .image-box img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            display: none;
            background: #fee;
            border: 2px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .error-message.active {
            display: block;
        }
        .instructions {
            background: #f0f8ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
        }
        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .instructions ul {
            margin-left: 20px;
            color: #555;
        }
        .instructions li {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 漫画日文OCR Demo</h1>
        
        <div class="instructions">
            <h3>📋 使用说明</h3>
            <ul>
                <li>上传一张漫画日文图片</li>
                <li>系统会自动检测文本区域并进行OCR识别</li>
                <li>返回的图片会标注检测到的文本框和识别结果</li>
                <li>支持拖拽上传或点击选择文件</li>
            </ul>
        </div>

        <div class="upload-section" id="uploadSection">
            <input type="file" id="fileInput" accept="image/*">
            <p style="margin-bottom: 20px; color: #666; font-size: 1.1em;">
                📁 拖拽图片到此处或点击上传
            </p>
            <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
                选择图片
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #667eea; font-size: 1.2em;">正在处理图片，请稍候...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="preview-section" id="previewSection">
            <div class="image-container">
                <div class="image-box">
                    <h3>📷 原始图片</h3>
                    <img id="originalImage" src="" alt="原始图片">
                </div>
                <div class="image-box">
                    <h3>✨ 处理结果</h3>
                    <img id="resultImage" src="" alt="处理结果">
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const previewSection = document.getElementById('previewSection');
        const originalImage = document.getElementById('originalImage');
        const resultImage = document.getElementById('resultImage');
        const errorMessage = document.getElementById('errorMessage');

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件！');
                return;
            }

            hideError();
            loading.classList.add('active');
            previewSection.classList.remove('active');
            uploadBtn.disabled = true;

            const originalUrl = URL.createObjectURL(file);
            originalImage.src = originalUrl;

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('处理失败');
                }

                const blob = await response.blob();
                const resultUrl = URL.createObjectURL(blob);
                resultImage.src = resultUrl;

                previewSection.classList.add('active');
            } catch (error) {
                showError('处理图片时出错：' + error.message);
            } finally {
                loading.classList.remove('active');
                uploadBtn.disabled = false;
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }

        function hideError() {
            errorMessage.classList.remove('active');
        }
    </script>
</body>
</html>
